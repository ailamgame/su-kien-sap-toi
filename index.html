<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sự Kiện Sắp Tới</title>
    <link rel="shortcut icon" href="/su-kien-sap-toi.png" type="image/x-icon">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg-body: #e0eafc; 
            --bg-body-end: #cfdef3; 
            --card-bg: rgba(255, 255, 255, 0.65); 
            --card-border: rgba(255, 255, 255, 0.8);
            --text-primary: #2c3e50;
            --text-secondary: #7f8c8d;
            --accent-start: #6a11cb;
            --accent-end: #2575fc;
            --color-today: #ff4757;
            --color-near: #ffa502;
            --color-far: #2ed573;
            --color-passed: #a4b0be; /* Thêm màu cho sự kiện đã qua */
            --transition: all 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, var(--bg-body) 0%, var(--bg-body-end) 100%);
            color: var(--text-primary); min-height: 100vh;
            display: flex; justify-content: center; align-items: flex-start; padding: 20px;
        }

        .app-wrapper {
            width: 100%; max-width: 500px; 
            background: var(--card-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 30px; border: 1px solid var(--card-border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08); overflow: hidden;
            padding-bottom: 25px; position: relative; margin-top: 20px;
        }

        /* --- HEADER & DROPDOWN MENU --- */
        .app-header { padding: 20px 25px; display: flex; justify-content: space-between; align-items: center; position: relative; }
        .header-title h1 { font-size: 20px; font-weight: 700; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
        .header-title h1 i { color: var(--accent-end); }
        .header-title p { font-size: 13px; color: var(--text-secondary); margin-top: 5px; }

        .menu-btn {
            background: white; border: none; width: 40px; height: 40px; border-radius: 50%;
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05); color: var(--text-primary);
            font-size: 18px; transition: var(--transition);
        }
        .menu-btn:hover { background: #f0f0f0; }

        .dropdown-menu {
            position: absolute; top: 65px; right: 25px; background: white; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 200px; z-index: 100; display: none; overflow: hidden;
        }
        .dropdown-menu.active { display: block; }
        .dropdown-item { padding: 12px 20px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 14px; font-weight: 500; transition: var(--transition); }
        .dropdown-item:hover { background: #f8f9fa; color: var(--accent-end); }
        .dropdown-item i { width: 16px; text-align: center; }
        .dropdown-item.danger { color: var(--color-today); }
        .dropdown-item.danger:hover { background: #fff0f0; }

        /* --- EMPTY STATE --- */
        .empty-state { text-align: center; padding: 50px 20px; display: none; }
        .empty-state h3 { font-size: 18px; color: var(--text-primary); margin-bottom: 10px; }
        .empty-state p { font-size: 14px; color: var(--text-secondary); margin-bottom: 25px; line-height: 1.5; }
        
        /* CÁC NÚT BẤM (BUTTONS) */
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-start) 0%, var(--accent-end) 100%);
            color: white; border: none; padding: 12px 25px; border-radius: 25px; font-size: 15px; font-weight: 600;
            cursor: pointer; box-shadow: 0 5px 15px rgba(37, 117, 252, 0.3); transition: var(--transition);
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(37, 117, 252, 0.4); }

        .btn-danger {
            background: linear-gradient(135deg, #ff7675 0%, #d63031 100%);
            color: white; border: none; padding: 12px 25px; border-radius: 25px; font-size: 15px; font-weight: 600;
            cursor: pointer; box-shadow: 0 5px 15px rgba(214, 48, 49, 0.3); transition: var(--transition);
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-danger:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(214, 48, 49, 0.4); }

        /* --- CONTENT AREA & HERO HIGHLIGHT --- */
        .app-content { padding: 0 25px; }
        .hero-highlight {
            background: linear-gradient(145deg, #ffffff 0%, rgba(255,255,255,0.4) 100%);
            border-radius: 24px; padding: 40px 20px 30px; text-align: center; cursor: pointer;
            box-shadow: 0 15px 35px rgba(37, 117, 252, 0.1); border: 1px solid rgba(255,255,255,0.9);
            margin-bottom: 35px; position: relative; overflow: hidden; transition: var(--transition);
        }
        .hero-highlight:hover { transform: translateY(-3px); box-shadow: 0 20px 40px rgba(37, 117, 252, 0.15); }
        .hero-content { position: relative; z-index: 1; }
        .hero-tag {
            display: inline-block; background: var(--color-today); color: white; font-size: 11px; font-weight: 700;
            padding: 5px 15px; border-radius: 20px; letter-spacing: 2px; margin-bottom: 15px; text-transform: uppercase;
        }
        .hero-tag.passed { background: var(--color-passed); }
        .hero-icon { font-size: 65px; margin-bottom: 15px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-12px); } 100% { transform: translateY(0px); } }
        .hero-title { font-size: 28px; font-weight: 800; color: var(--text-primary); line-height: 1.2; margin-bottom: 8px; }
        .hero-subtitle { font-size: 15px; color: var(--accent-start); font-weight: 600; margin-bottom: 25px; }
        .hero-days {
            font-size: 90px; font-weight: 900; line-height: 0.9;
            background: linear-gradient(135deg, var(--accent-start) 0%, var(--accent-end) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 2px 4px 15px rgba(37, 117, 252, 0.2); margin-bottom: 5px;
        }
        .hero-days-text { font-size: 16px; text-transform: uppercase; letter-spacing: 3px; color: var(--text-secondary); font-weight: 700; }
        .hero-exact-date {
            margin-top: 20px; font-size: 14px; color: var(--text-secondary); display: inline-flex; align-items: center; gap: 8px;
            background: rgba(0,0,0,0.03); padding: 8px 15px; border-radius: 12px;
        }

        /* --- DANH SÁCH SỰ KIỆN --- */
        .list-section-title { font-size: 14px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; font-weight: 600; }
        .event-list { list-style: none; }
        
        .event-item {
            background: rgba(255, 255, 255, 0.5); border-radius: 16px; padding: 15px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.6); transition: var(--transition); position: relative; overflow: hidden; 
        }
        .event-item:hover { background: rgba(255, 255, 255, 0.9); transform: translateX(5px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        .item-main { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
        
        /* Icon Gradient rực rỡ */
        .type-icon { 
            width: 46px; height: 46px; border-radius: 14px; display: flex; 
            justify-content: center; align-items: center; font-size: 20px; flex-shrink: 0; 
            border: 3px solid #ffffff; 
        }
        
        .icon-birthday { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); color: #ffffff; box-shadow: 0 5px 15px rgba(253, 160, 133, 0.4); }
        .icon-anni { background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%); color: #ffffff; box-shadow: 0 5px 15px rgba(255, 117, 140, 0.4); }
        .icon-memorial { background: linear-gradient(135deg, #8e9eab 0%, #6b7b8c 100%); color: #ffffff; box-shadow: 0 5px 15px rgba(142, 158, 171, 0.4); }
        .icon-holiday { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: #ffffff; box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4); }
        
        .item-titles { flex: 1; min-width: 0; }
        .item-titles .title { font-size: 16px; font-weight: 700; margin-bottom: 4px; padding-right: 0; line-height: 1.3; color: var(--text-primary); }
        .item-titles .subtitle { font-size: 13px; color: var(--text-secondary); display: flex; align-items: center; gap: 5px;}
        .item-titles .subtitle-tag { background: #eee; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; color: #555; }
        
        .item-actions { flex-shrink: 0; margin-left: 10px; }
        .compact-badge { 
            padding: 8px 12px; border-radius: 20px; font-size: 13px; font-weight: 700; 
            min-width: 85px; text-align: center; letter-spacing: 0.5px;
        }
        
        .status-today { background-color: #ffeaa7; color: #d63031; }
        .status-near { background-color: #ffeaa7; color: #e17055; }
        .status-far { background-color: #e8f8f5; color: #16a085; }
        .status-passed { background-color: #f1f2f6; color: var(--color-passed); } /* CSS cho sự kiện đã qua */

        /* --- NÚT FAB FIXED GÓC DƯỚI BÊN PHẢI MÀN HÌNH --- */
        .fab-container { position: fixed; bottom: 30px; right: 30px; z-index: 1000; }
        .fab-btn {
            width: 55px; height: 55px; border-radius: 50%; border: none; background: linear-gradient(135deg, var(--accent-start) 0%, var(--accent-end) 100%);
            color: white; font-size: 24px; cursor: pointer; box-shadow: 0 10px 20px rgba(37, 117, 252, 0.4); transition: var(--transition);
            display: flex; justify-content: center; align-items: center;
        }
        .fab-btn:hover { transform: scale(1.1) rotate(90deg); box-shadow: 0 15px 25px rgba(37, 117, 252, 0.6); }

        /* --- MODAL CHUNG --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center; z-index: 9999;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: white; width: 90%; max-width: 400px; border-radius: 24px; padding: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2); transform: translateY(20px); opacity: 0; transition: all 0.3s ease; position: relative;
        }
        .modal-overlay.active .modal-content { transform: translateY(0); opacity: 1; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .modal-header h2 { font-size: 20px; color: var(--text-primary); }
        .btn-close { background: #f1f2f6; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; color: var(--text-secondary); transition: var(--transition); }
        .btn-close:hover { background: #ff7675; color: white; }

        /* FORM MODAL */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
        .form-control { width: 100%; padding: 12px 15px; border: 2px solid #f1f2f6; border-radius: 12px; font-size: 15px; outline: none; transition: var(--transition); font-family: 'Roboto', sans-serif;}
        .form-control:focus { border-color: var(--accent-end); }
        
        .date-inputs { display: flex; gap: 10px; }
        .date-inputs input { text-align: center; padding: 12px 8px; }
        
        .flex-row { display: flex; gap: 15px; }
        .flex-row .form-group { flex: 1; }

        .btn-submit { width: 100%; background: linear-gradient(135deg, var(--accent-start) 0%, var(--accent-end) 100%); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; transition: var(--transition); }
        .btn-submit:hover { box-shadow: 0 5px 15px rgba(37, 117, 252, 0.4); }

        /* VIEW MODAL (Chi tiết sự kiện) */
        .view-content { text-align: center; padding: 40px 25px 30px; }
        .view-close { position: absolute; top: 15px; right: 15px; }
        .view-icon { font-size: 55px; margin-bottom: 15px; }
        .view-title { font-size: 24px; font-weight: 800; color: var(--text-primary); margin-bottom: 5px; }
        .view-subtitle { font-size: 14px; font-weight: 500; color: var(--accent-start); margin-bottom: 25px; }
        .view-days { 
            font-size: 40px; font-weight: 900; margin-bottom: 25px;
            background: linear-gradient(135deg, var(--accent-start) 0%, var(--accent-end) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .view-days.passed {
            background: var(--text-secondary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 35px;
        }
        .view-detail-box { background: #f8f9fa; border-radius: 16px; padding: 15px; text-align: left; margin-bottom: 25px; }
        .view-detail-box p { font-size: 14px; color: var(--text-primary); margin: 10px 0; display: flex; align-items: center; gap: 10px; }
        .view-detail-box i { color: var(--text-secondary); font-size: 16px; width: 20px; text-align: center; }
        .view-actions { display: flex; gap: 10px; margin-top: 10px; }
        .view-actions button { flex: 1; }

    </style>
</head>
<body>

    <div class="app-wrapper">
        <div class="app-header">
            <div class="header-title">
                <h1><i class="fa-solid fa-layer-group"></i> Trợ lý sự kiện</h1>
                <p id="current-date-display"></p>
            </div>
            <button class="menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-ellipsis-vertical"></i></button>
            
            <div class="dropdown-menu" id="dropdownMenu">
                <div class="dropdown-item" onclick="loadDefaultData()"><i class="fa-solid fa-download"></i> Tải dữ liệu mẫu</div>
                <div class="dropdown-item danger" onclick="clearAllData()"><i class="fa-solid fa-trash-can"></i> Xóa tất cả dữ liệu</div>
            </div>
        </div>
        
        <div class="empty-state" id="empty-state">
            <i class="fa-solid fa-box-open" style="font-size: 60px; color: #bdc3c7; margin-bottom: 20px;"></i>
            <h3>Chưa có sự kiện nào</h3>
            <p>Hãy thêm sự kiện mới hoặc tải dữ liệu mẫu có sẵn để bắt đầu nhé!</p>
            <button class="btn-primary" onclick="openFormModal()"><i class="fa-solid fa-plus"></i> Thêm Sự Kiện</button>
        </div>

        <div class="app-content" id="main-content">
            <div id="highlight-area"></div>
            <h3 class="list-section-title"><span>Tất cả sự kiện quản lý</span></h3>
            <ul class="event-list" id="events-container"></ul>
        </div>
    </div>

    <div class="fab-container" id="fab-container">
        <button class="fab-btn" onclick="openFormModal()"><i class="fa-solid fa-plus"></i></button>
    </div>

    <div class="modal-overlay" id="formModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Thêm Sự Kiện Mới</h2>
                <button class="btn-close" onclick="closeFormModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="eventForm" onsubmit="handleSaveEvent(event)">
                <input type="hidden" id="eventId"> 
                
                <div class="form-group">
                    <label>Tên sự kiện</label>
                    <input type="text" class="form-control" id="eventName" onfocus="this.select()" required>
                </div>
                
                <div class="form-group">
                    <label>Ngày diễn ra (Nhập số)</label>
                    <div class="date-inputs">
                        <input type="number" class="form-control" id="inputDay" placeholder="Ngày" min="1" max="31" onfocus="this.select()" required>
                        <input type="number" class="form-control" id="inputMonth" placeholder="Tháng" min="1" max="12" onfocus="this.select()" required>
                        <input type="number" class="form-control" id="inputYear" placeholder="Năm" min="0" max="9999" onfocus="this.select()" required>
                    </div>
                </div>

                <div class="flex-row">
                    <div class="form-group">
                        <label>Loại sự kiện</label>
                        <select class="form-control" id="eventType">
                            <option value="Birthday">Sinh nhật</option>
                            <option value="Anni">Kỷ niệm</option>
                            <option value="Memorial">Ngày giỗ</option>
                            <option value="Holiday">Lễ / Sự kiện</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Tần suất</label>
                        <select class="form-control" id="eventFrequency">
                            <option value="yearly">Hằng năm</option>
                            <option value="once">1 lần</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">Lưu Sự Kiện</button>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="viewModal">
        <div class="modal-content view-content">
            <button class="btn-close view-close" onclick="closeViewModal()"><i class="fa-solid fa-xmark"></i></button>
            <div id="viewModalBody"></div>
        </div>
    </div>

    <script>
        // CẬP NHẬT: Thêm frequency (Tần suất) vào data mẫu
        const myDefaultData = [
            { id: 101, name: "Kỷ niệm ngày cưới", date: "2024-11-20", type: "Anni", frequency: "yearly" },
            { id: 102, name: "Sinh nhật Vk yêu", date: "2000-07-11", type: "Birthday", frequency: "yearly" },
            { id: 103, name: "Sinh nhật Ck yêu", date: "1995-12-18", type: "Birthday", frequency: "yearly" },
            { id: 104, name: "Kỳ thi quan trọng", date: "2024-12-15", type: "Holiday", frequency: "once" }, // Data mẫu 1 lần (sẽ có thể báo đã qua)
            { id: 105, name: "Chuyến du lịch gia đình", date: "2025-08-20", type: "Holiday", frequency: "once" }
        ];

        const typeMap = {
            'Birthday': { icon: 'fa-cake-candles', color: '#fda085', class: 'icon-birthday' },
            'Anni': { icon: 'fa-champagne-glasses', color: '#ff7eb3', class: 'icon-anni' },
            'Memorial': { icon: 'fa-leaf', color: '#6b7b8c', class: 'icon-memorial' },
            'Holiday': { icon: 'fa-star', color: '#00f2fe', class: 'icon-holiday' }
        };

        function getEvents() { return JSON.parse(localStorage.getItem('remindme_events')) || []; }
        function saveEvents(events) { localStorage.setItem('remindme_events', JSON.stringify(events)); renderUI(); }

        const formatStringDateVN = (dateString) => {
            const parts = dateString.split('-');
            if(parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
            return dateString;
        };
        const formatDateObjVN = (dateObj) => `${dateObj.getDate().toString().padStart(2, '0')}/${(dateObj.getMonth() + 1).toString().padStart(2, '0')}/${dateObj.getFullYear()}`;

        function toggleMenu() { document.getElementById('dropdownMenu').classList.toggle('active'); }
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.menu-btn') && !e.target.closest('.dropdown-menu')) {
                document.getElementById('dropdownMenu').classList.remove('active');
            }
        });

        function loadDefaultData() { saveEvents(myDefaultData); document.getElementById('dropdownMenu').classList.remove('active'); }
        function clearAllData() { if(confirm('Bạn có chắc chắn muốn xóa toàn bộ dữ liệu?')) { saveEvents([]); document.getElementById('dropdownMenu').classList.remove('active'); } }

        function openFormModal(id = null) {
            document.getElementById('formModal').classList.add('active');
            const form = document.getElementById('eventForm');
            form.reset();
            
            if (id) {
                document.getElementById('modalTitle').innerText = 'Chỉnh Sửa Sự Kiện';
                document.getElementById('submitBtn').innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Cập Nhật';
                const eventToEdit = getEvents().find(ev => ev.id === id);
                if (eventToEdit) {
                    document.getElementById('eventId').value = eventToEdit.id;
                    document.getElementById('eventName').value = eventToEdit.name;
                    document.getElementById('eventType').value = eventToEdit.type;
                    
                    // Lấy tần suất (nếu data cũ chưa có thì mặc định là yearly)
                    document.getElementById('eventFrequency').value = eventToEdit.frequency || 'yearly';
                    
                    const dateParts = eventToEdit.date.split('-');
                    if(dateParts.length === 3) {
                        document.getElementById('inputYear').value = parseInt(dateParts[0]);
                        document.getElementById('inputMonth').value = parseInt(dateParts[1]);
                        document.getElementById('inputDay').value = parseInt(dateParts[2]);
                    }
                }
            } else {
                document.getElementById('modalTitle').innerText = 'Thêm Sự Kiện Mới';
                document.getElementById('submitBtn').innerHTML = 'Lưu Sự Kiện';
                document.getElementById('eventId').value = '';
                document.getElementById('inputYear').value = new Date().getFullYear();
                document.getElementById('eventFrequency').value = 'yearly';
            }
        }
        
        function closeFormModal() { document.getElementById('formModal').classList.remove('active'); }

        function handleSaveEvent(e) {
            e.preventDefault();
            const id = document.getElementById('eventId').value;
            const name = document.getElementById('eventName').value;
            const type = document.getElementById('eventType').value;
            const frequency = document.getElementById('eventFrequency').value; // Lấy giá trị Tần suất

            const dayInput = document.getElementById('inputDay').value;
            const monthInput = document.getElementById('inputMonth').value;
            const yearInput = document.getElementById('inputYear').value;

            const dayInt = parseInt(dayInput, 10);
            const monthInt = parseInt(monthInput, 10);
            const yearInt = parseInt(yearInput, 10);

            const checkDate = new Date();
            checkDate.setFullYear(yearInt, monthInt - 1, dayInt);
            
            if (checkDate.getFullYear() !== yearInt || checkDate.getMonth() !== monthInt - 1 || checkDate.getDate() !== dayInt) {
                alert('Ngày tháng không hợp lệ (ví dụ: tháng đã nhập không có ngày này). Vui lòng nhập lại!');
                return;
            }

            const d = dayInput.padStart(2, '0');
            const m = monthInput.padStart(2, '0');
            const y = yearInput.padStart(4, '0');
            const dateStr = `${y}-${m}-${d}`;

            let events = getEvents();

            if (id) {
                const index = events.findIndex(ev => ev.id == id);
                if (index > -1) {
                    events[index] = { id: parseInt(id), name, date: dateStr, type, frequency };
                }
            } else {
                events.push({ id: Date.now(), name, date: dateStr, type, frequency });
            }

            saveEvents(events);
            closeFormModal();
        }

        function deleteEvent(id) {
            if(confirm('Bạn có chắc chắn muốn xóa sự kiện này?')) {
                saveEvents(getEvents().filter(ev => ev.id !== id));
                closeViewModal();
            }
        }

        function viewEvent(id) {
            const rawEvents = getEvents();
            const processedEvents = processEvents(rawEvents);
            const ev = processedEvents.find(e => e.id === id);
            
            if(!ev) return;

            const typeInfo = typeMap[ev.type] || { icon: 'fa-calendar', color: '#ccc' };
            
            // Xử lý logic hiển thị text trong Modal chi tiết
            let subtitleText = '';
            if (ev.frequency === 'once') {
                subtitleText = 'Sự kiện 1 lần';
            } else {
                subtitleText = ev.yearsCount > 0 ? `Kỷ niệm lần thứ ${ev.yearsCount}` : 'Sự kiện định kỳ';
            }

            let daysTextHTML = '';
            if (ev.daysRemaining < 0) {
                daysTextHTML = `<div class="view-days passed">ĐÃ QUA</div>`;
            } else if (ev.daysRemaining === 0) {
                daysTextHTML = `<div class="view-days">HÔM NAY!</div>`;
            } else {
                daysTextHTML = `<div class="view-days">${ev.daysRemaining} Ngày</div>`;
            }

            document.getElementById('viewModalBody').innerHTML = `
                <div class="view-icon" style="color: ${typeInfo.color}; text-shadow: 0 10px 20px ${typeInfo.color}66;"><i class="fa-solid ${typeInfo.icon}"></i></div>
                <h2 class="view-title">${ev.name}</h2>
                <div class="view-subtitle">${subtitleText}</div>
                
                ${daysTextHTML}
                
                <div class="view-detail-box">
                    <p><i class="fa-solid fa-clock-rotate-left"></i> <strong>Ngày gốc:</strong> ${formatStringDateVN(ev.date)}</p>
                    <p><i class="fa-regular fa-calendar-check"></i> <strong>Sắp tới:</strong> ${formatDateObjVN(ev.nextDate)}</p>
                </div>

                <div class="view-actions">
                    <button class="btn-primary" onclick="closeViewModal(); openFormModal(${ev.id})">
                        <i class="fa-solid fa-pen"></i> Sửa
                    </button>
                    <button class="btn-danger" onclick="deleteEvent(${ev.id})">
                        <i class="fa-solid fa-trash-can"></i> Xóa
                    </button>
                </div>
            `;
            document.getElementById('viewModal').classList.add('active');
        }

        function closeViewModal() { document.getElementById('viewModal').classList.remove('active'); }

        // CẬP NHẬT LỚN NHẤT: Xử lý logic cộng năm và tính ngày cho "Hằng năm" vs "1 lần"
        function processEvents(rawEvents) {
            const today = new Date(); today.setHours(0, 0, 0, 0);
            rawEvents.forEach(event => {
                const eventDate = new Date(event.date);
                const freq = event.frequency || 'yearly'; // Fallback nếu data cũ không có
                let nextOccurrence;

                if (freq === 'yearly') {
                    // Logic lặp lại hằng năm
                    let yearToCalculate = eventDate.getFullYear() === 0 ? today.getFullYear() : today.getFullYear();
                    nextOccurrence = new Date(yearToCalculate, eventDate.getMonth(), eventDate.getDate());
                    // Nếu ngày sinh nhật năm nay đã qua, đẩy sang năm sau
                    if (nextOccurrence < today) nextOccurrence.setFullYear(today.getFullYear() + 1);
                    event.yearsCount = eventDate.getFullYear() > 0 ? nextOccurrence.getFullYear() - eventDate.getFullYear() : 0;
                } else {
                    // Logic 1 lần (Giữ nguyên ngày)
                    nextOccurrence = new Date(event.date);
                    event.yearsCount = 0; 
                }
                
                // Trả về số âm nếu ngày 1 lần đã qua trong quá khứ
                event.daysRemaining = Math.ceil((nextOccurrence - today) / (1000 * 60 * 60 * 24));
                event.nextDate = nextOccurrence;
            });

            // Sắp xếp: Ưu tiên sự kiện sắp tới. Sự kiện đã qua (số âm) vứt xuống đáy danh sách.
            return rawEvents.sort((a, b) => {
                if (a.daysRemaining < 0 && b.daysRemaining >= 0) return 1;
                if (b.daysRemaining < 0 && a.daysRemaining >= 0) return -1;
                return a.daysRemaining - b.daysRemaining;
            });
        }

        function renderUI() {
            const now = new Date();
            document.getElementById('current-date-display').innerText = now.toLocaleDateString('vi-VN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            
            const rawEvents = getEvents();
            if (rawEvents.length === 0) {
                document.getElementById('main-content').style.display = 'none';
                document.getElementById('empty-state').style.display = 'block';
                return;
            }
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('empty-state').style.display = 'none';

            const sortedEvents = processEvents(rawEvents);
            const closest = sortedEvents[0];
            const typeInfo = typeMap[closest.type] || { icon: 'fa-calendar', color: '#ccc' };
            
            let subtitleText = '';
            if (closest.frequency === 'once') subtitleText = 'Sự kiện 1 lần';
            else subtitleText = closest.yearsCount > 0 ? `Kỷ niệm lần thứ ${closest.yearsCount}` : 'Sự kiện định kỳ';
            
            // Xử lý Hero Section (nếu sự kiện gần nhất bị âm tức là mọi sự kiện đều đã trôi qua hết)
            let highlightDaysHTML = '';
            let heroTagHTML = '<div class="hero-tag">Sắp diễn ra</div>';
            
            if (closest.daysRemaining < 0) {
                heroTagHTML = '<div class="hero-tag passed">Đã qua</div>';
                highlightDaysHTML = `<div class="hero-days" style="font-size: 60px; color: var(--color-passed); -webkit-text-fill-color: var(--color-passed);">ĐÃ QUA</div>`;
            } else if (closest.daysRemaining === 0) {
                highlightDaysHTML = `<div class="hero-days" style="font-size: 60px; color: var(--color-today); -webkit-text-fill-color: var(--color-today);">HÔM NAY!</div>`;
            } else {
                highlightDaysHTML = `<div class="hero-days">${closest.daysRemaining}</div><div class="hero-days-text">Ngày Nữa</div>`;
            }

            // RENDER HERO
            document.getElementById('highlight-area').innerHTML = `
                <div class="hero-highlight" onclick="viewEvent(${closest.id})">
                    <div class="hero-content">
                        ${heroTagHTML}
                        <div class="hero-icon" style="color: ${typeInfo.color}; text-shadow: 0 10px 20px ${typeInfo.color}66;"><i class="fa-solid ${typeInfo.icon}"></i></div>
                        <h2 class="hero-title">${closest.name}</h2>
                        <div class="hero-subtitle">${subtitleText}</div>
                        ${highlightDaysHTML}
                        <div class="hero-exact-date"><i class="fa-regular fa-calendar-check"></i> ${formatDateObjVN(closest.nextDate)}</div>
                    </div>
                </div>
            `;

            // RENDER LIST
            const listContainer = document.getElementById('events-container');
            listContainer.innerHTML = '';
            
            sortedEvents.forEach(event => {
                const itemType = typeMap[event.type] || { icon: 'fa-calendar', class: 'icon-holiday' };
                let statusClass = '';
                let dayText = '';

                // Xác định trạng thái của Item
                if (event.daysRemaining < 0) {
                    statusClass = 'status-passed';
                    dayText = 'Đã qua';
                } else if (event.daysRemaining === 0) {
                    statusClass = 'status-today';
                    dayText = 'Hôm nay';
                } else if (event.daysRemaining <= 7) {
                    statusClass = 'status-near';
                    dayText = `${event.daysRemaining} ngày`;
                } else {
                    statusClass = 'status-far';
                    dayText = `${event.daysRemaining} ngày`;
                }

                const freqTag = event.frequency === 'once' ? '<span class="subtitle-tag">1 Lần</span> ' : '';

                listContainer.innerHTML += `
                    <li class="event-item" onclick="viewEvent(${event.id})">
                        <div class="item-main">
                            <div class="type-icon ${itemType.class}"><i class="fa-solid ${itemType.icon}"></i></div>
                            <div class="item-titles">
                                <div class="title">${event.name}</div>
                                <div class="subtitle">${freqTag}<i class="fa-regular fa-calendar"></i> ${formatDateObjVN(event.nextDate)}</div>
                            </div>
                        </div>
                        <div class="item-actions">
                            <div class="compact-badge ${statusClass}">${dayText}</div>
                        </div>
                    </li>
                `;
            });
        }

        renderUI();
    </script>
</body>
</html>
